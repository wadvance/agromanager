name: agromanager
description: "Gestión integral de finca con GPS y clima - Chiriquí, Panamá"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.6
  http: ^1.3.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  latlong2: ^0.9.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  provider: ^6.1.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.2
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  pdf: ^3.11.3
  printing: ^5.14.2
  csv: ^6.0.0
  open_file: ^3.5.10
  shared_preferences: ^2.3.5
  mqtt_client: ^10.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
