name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable

      - name: Generate firebase_options.dart
        run: |
          cp lib/firebase_options_template.dart lib/firebase_options.dart
          sed -i "s|@FIREBASE_API_KEY@|${{ secrets.FIREBASE_API_KEY }}|g" lib/firebase_options.dart
          sed -i "s|@FIREBASE_AUTH_DOMAIN@|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" lib/firebase_options.dart
          sed -i "s|@FIREBASE_PROJECT_ID@|${{ secrets.FIREBASE_PROJECT_ID }}|g" lib/firebase_options.dart
          sed -i "s|@FIREBASE_STORAGE_BUCKET@|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" lib/firebase_options.dart
          sed -i "s|@FIREBASE_SENDER_ID@|${{ secrets.FIREBASE_SENDER_ID }}|g" lib/firebase_options.dart
          sed -i "s|@FIREBASE_APP_ID_WEB@|${{ secrets.FIREBASE_APP_ID_WEB }}|g" lib/firebase_options.dart
          sed -i "s|@FIREBASE_APP_ID_ANDROID@|${{ secrets.FIREBASE_APP_ID_ANDROID }}|g" lib/firebase_options.dart
          sed -i "s|@FIREBASE_APP_ID_IOS@|${{ secrets.FIREBASE_APP_ID_IOS }}|g" lib/firebase_options.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agromanager-release
          path: build/app/outputs/flutter-apk/app-release.apk
          compression-level: 0
